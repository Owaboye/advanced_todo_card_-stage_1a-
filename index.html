<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced to do App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <article data-testid="test-todo-card">

     <div class="top-row">
          <span 
            data-testid="test-todo-priority"  
            aria-label="High priority task"
            class="priority-badge priority-high"
            id="taskPriority"
            >
            High 
            <strong data-priority="high" data-testid="test-todo-priority-indicator" class="priority-indicator"></strong>
        </span>

         <span id="taskStatus" data-testid="test-todo-status" class="status-badge status-pending">
            Pending
        </span>
    </div>
        <!-- <span 
            data-testid="test-todo-priority"  
            aria-label="High priority task"
            class="priority-badge priority-high"
            id="taskPriority"
            >
            High 
            <strong data-priority="high" data-testid="test-todo-priority-indicator" class="priority-indicator"></strong>
        </span> -->

        <input 
          type="checkbox" 
          id='complete'
          data-testid="test-todo-complete-toggle"/>
        <label class="complete-label" for="complete">Mark as complete</label> 

        <h2 id="todoTitle" data-testid="test-todo-title">Build and deploy Todo Card Component</h2>

         <!-- Collapsible -->
        <div data-testid="test-todo-collapsible-section" id="desc">
            <p id="description" data-testid="test-todo-description">Create and deploy a testable, accessible todo card...</p>
            <button 
               id="expand-toggle" 
               data-testid="test-todo-expand-toggle" 
               aria-expanded="false"
               aria-controls="desc"
               >
                Expand
            </button>
        </div>

        <div class="date-info">
            <time data-testid="test-todo-due-date" dateTime="" class="due-date">
                Due April 16, 2026
            </time>
            <div class="wraper-time-with-overdue-indicator">
                
                <time id="timeRemaining" data-testid="test-todo-time-remaining" aria-live="polite" class="time-remaining">
                    
                </time>
                <span data-testid="test-todo-overdue-indicator" id="overdue-indicator"></span>

            </div>
        </div>

         <!-- <span id="taskStatus" data-testid="test-todo-status" class="status-badge status-pending">
            Pending
        </span> -->

        <!-- Status Control --> 
        <label for="statusControl">Status</label>
        <select id="statusControl" data-testid="test-todo-status-control">
            <option>Pending</option> 
            <option>In Progress</option>
            <option>Done</option> 
        </select>

        <ul data-testid="test-todo-tags" role="list">
            <li data-testid="test-todo-tag-work">work</li>
            <li data-testid="test-todo-tag-urgent">urgent</li>
        </ul>

       <div className="actions">
            <button id="editBtn" data-testid="test-todo-edit-button">
                Edit
            </button>

            <button id="deleteBtn" data-testid="test-todo-delete-button">
                Delete
            </button>
       </div>

       <div id="editFormContainer" data-testid="test-todo-edit-form" class="hidden">
        <form action="">
           <div class="form-group">
                <label for="edit-title">Title</label>
                <input id="edit-title" data-testid="test-todo-edit-title-input">
           </div>
           <div class="form-group">
                <label for="edit-description">Description</label>
                <textarea id="edit-description" data-testid="test-todo-edit-description-input"></textarea>
           </div>
           <div class="form-group">
                <label>Priority</label>
                <select data-testid="test-todo-edit-priority-select">
                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>
                </select>
           </div>
           <div class="form-group">
                <label>Due Date</label>
                <input type="datetime-local" data-testid="test-todo-edit-due-date-input">
           </div>

            <button type="button" data-testid="test-todo-save-button">Save</button>
            <button type="button" data-testid="test-todo-cancel-button">Cancel</button>
        </form>
    </div>
    </article>
    <script type="module" src="app.js"></script>
</body>
</html>
